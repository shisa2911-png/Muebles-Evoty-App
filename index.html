<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MAESTRO V21</title>
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; padding: 50px; text-align: center; }
        .box { border: 2px solid #ffcc00; padding: 20px; display: inline-block; border-radius: 10px; }
        input { margin: 10px; padding: 10px; width: 200px; display: block; }
        button { background: #ffcc00; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>MAESTRO HEINER V21</h1>
        <input type="number" id="l" placeholder="Largo (cm)">
        <input type="number" id="a" placeholder="Ancho (cm)">
        <button onclick="res.innerHTML='Total: ₡'+(l.value/100*a.value/100*15000)">CALCULAR</button>
        <h2 id="res">₡0</h2>
    </div>
</body>
</html>
