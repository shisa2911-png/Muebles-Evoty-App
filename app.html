<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO V21 - Muebles Evoty</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 15px; background: #222; max-width: 400px; margin: auto; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #ffcc00; font-size: 20px; margin: 10px 0; }
        label { display: block; text-align: left; margin-top: 15px; color: #ffcc00; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-size: 16px; }
        button { background: #ffcc00; color: #000; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border: none; border-radius: 8px; margin-top: 20px; font-size: 16px; transition: 0.3s; }
        button:active { background: #e6b800; transform: scale(0.98); }
        .resultado { background: #333; margin-top: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid #ffcc00; text-align: center; }
        h2 { margin: 0; color: #fff; font-size: 24px; }
        .version { font-size: 10px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <img src="Icons/icon-192x192.png" alt="Logo" style="width: 70px; margin-bottom: 5px;" onerror="this.style.display='none'">
        
        <h1>SISTEMA MAESTRO V21</h1>
        <p style="font-size: 12px; color: #888; margin: 0;">Control de Cotizaciones</p>
        
        <label>Largo del mueble (cm):</label>
        <input type="number" id="l" placeholder="Ej: 120" oninput="guardarYCalcular()">
        
        <label>Ancho / Fondo (cm):</label>
        <input type="number" id="a" placeholder="Ej: 60" oninput="guardarYCalcular()">
        
        <label>Tipo de Material:</label>
        <select id="m" onchange="guardarYCalcular()">
            <option value="15000">Melamina Estándar (₡15k)</option>
            <option value="19000">Melamina Hidrófuga (₡19k)</option>
            <option value="25000">Madera Sólida (₡25k)</option>
        </select>

        <div class="resultado">
            <h2 id="res">₡0</h2>
            <small id="detalle" style="color: #aaa;">Esperando medidas...</small>
        </div>

        <button onclick="borrarTodo()">BORRAR TODO</button>
        
        <div class="version">V21.4 - Actualización Automática Activa</div>
    </div>

    <script>
        // 1. CARGAR DATOS AL ABRIR
        window.onload = function() {
            if(localStorage.getItem('evoty_largo')) {
                document.getElementById('l').value = localStorage.getItem('evoty_largo');
                document.getElementById('a').value = localStorage.getItem('evoty_ancho');
                document.getElementById('m').value = localStorage.getItem('evoty_material');
                calcular(); 
            }
            // Forzar actualización de la App en segundo plano
            if (navigator.serviceWorker) {
                navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.update()));
            }
        };

        // 2. GUARDAR Y CALCULAR AL MISMO TIEMPO
        function guardarYCalcular() {
            let largo = document.getElementById('l').value;
            let ancho = document.getElementById('a').value;
            let material = document.getElementById('m').value;

            localStorage.setItem('evoty_largo', largo);
            localStorage.setItem('evoty_ancho', ancho);
            localStorage.setItem('evoty_material', material);
            
            calcular();
        }

        function calcular() {
            let l = document.getElementById('l').value;
            let a = document.getElementById('a').value;
            let p = document.getElementById('m').value;

            if(l > 0 && a > 0) {
                let m2 = (l / 100) * (a / 100);
                let total = m2 * p;
                document.getElementById('res').innerText = "₡" + Math.round(total).toLocaleString();
                document.getElementById('detalle').innerText = "Área: " + m2.toFixed(2) + " m²";
            } else {
                document.getElementById('res').innerText = "₡0";
                document.getElementById('detalle').innerText = "Ingrese medidas";
            }
        }

        // 3. BOTÓN PARA LIMPIAR SI TERMINÓ EL TRABAJO
        function borrarTodo() {
            if(confirm("¿Deseas borrar los datos actuales?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html
